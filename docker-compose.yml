services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - server_node_modules:/app/server/node_modules
      - damage_calc_node_modules:/app/damage-calc/calc/node_modules
    working_dir: /app/server
    command: >
      sh -c "
        if [ ! -f /app/damage-calc/calc/package.json ]; then
          echo 'Initializing damage-calc submodule...' &&
          cd /app && git submodule update --init damage-calc;
        fi &&
        if [ ! -f /app/damage-calc/calc/dist/index.js ]; then
          echo 'Building damage-calc...' &&
          cd /app/damage-calc/calc && npm install && npm run build;
        fi &&
        cd /app/server && npm install && npm run dev
      "
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - BASE_PATH=${BASE_PATH:-pokemonparty}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pokemonparty-api.rule=Host(`luigifusco.dev`) && PathPrefix(`/pokemonparty/api`)"
      - "traefik.http.routers.pokemonparty-api.entrypoints=websecure"
      - "traefik.http.routers.pokemonparty-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.pokemonparty-api.loadbalancer.server.port=3001"
      - "traefik.http.routers.pokemonparty-ws.rule=Host(`luigifusco.dev`) && PathPrefix(`/pokemonparty/socket.io`)"
      - "traefik.http.routers.pokemonparty-ws.entrypoints=websecure"
      - "traefik.http.routers.pokemonparty-ws.tls.certresolver=letsencrypt"
      - "traefik.http.services.pokemonparty-ws.loadbalancer.server.port=3001"
    networks:
      - default
      - traefik-net

  client:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - client_node_modules:/app/client/node_modules
    working_dir: /app/client
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - API_TARGET=http://server:3001
      - BASE_PATH=${BASE_PATH:-pokemonparty}
    depends_on:
      - server
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pokemonparty.rule=Host(`luigifusco.dev`) && PathPrefix(`/pokemonparty`)"
      - "traefik.http.routers.pokemonparty.entrypoints=websecure"
      - "traefik.http.routers.pokemonparty.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.pokemonparty-slash.redirectregex.regex=^(.*)/pokemonparty$$"
      - "traefik.http.middlewares.pokemonparty-slash.redirectregex.replacement=$${1}/pokemonparty/"
      - "traefik.http.middlewares.pokemonparty-slash.redirectregex.permanent=true"
      - "traefik.http.routers.pokemonparty.middlewares=pokemonparty-slash"
      - "traefik.http.services.pokemonparty.loadbalancer.server.port=5173"
    networks:
      - default
      - traefik-net

volumes:
  server_node_modules:
  client_node_modules:
  damage_calc_node_modules:

networks:
  traefik-net:
    name: traefik-net
    external: true
